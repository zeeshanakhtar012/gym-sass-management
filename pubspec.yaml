name: gym_erp
description: "Complete Offline-First Gym Management ERP"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State Management & Routing
  get: ^4.7.2

  # Database (Offline-first - no network)
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.4+4
  path_provider: ^2.1.5
  path: ^1.9.1

  # Responsive Design
  flutter_screenutil: ^5.9.3
  responsive_framework: ^1.5.1

  # Icons
  phosphoricons_flutter: ^1.0.0

  # Charts
  fl_chart: ^0.70.2

  # PDF & Printing
  pdf: ^3.11.3
  printing: ^5.14.2

  # Excel Export
  excel: ^4.0.6

  # File Operations
  file_picker: ^8.1.7+2

  # Fingerprint Matching (pure Dart, no ZK SDK required)
  dartafis: ^0.1.0
  image_picker: ^1.1.2
  archive: ^3.6.1
  uuid: ^4.5.1

  # Password Hashing (Pure Dart, no network)
  bcrypt: ^1.1.3

  # Date/Time
  intl: ^0.20.2

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.7

  # FFI (ZKTeco fingerprint device)
  ffi: ^2.1.3

  # Utilities
  collection: ^1.19.1

cupertino_icons: ^1.0.8

flutter_launcher_icons:
  android: true
  ios: true
  windows:
    generate: true
  macos:
    generate: true
  image_path: "assets/images/logo.png"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/images/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-Light.ttf
          weight: 300
